  <g id="system-notes" class="ui" transform="translate(48 880)">
    <rect width="1412" height="128" rx="16" fill="#222" stroke="#444"/>
    <text class="label" x="24" y="36">Calibration notes</text>
    <text class="note" x="24" y="66">• Original SVG text is outlined; Microsoft JhengHei is a rendering candidate, not an observed font.</text>
    <text class="note" x="24" y="92">• Success and warning colors are intentionally omitted until real product semantics are confirmed.</text>
    <text class="note" x="760" y="66">• This file does not replace works/everline_p1.ai.</text>
    <text class="note" x="760" y="92">• Review spacing, type weight, and 40 px compact height before promotion.</text>
