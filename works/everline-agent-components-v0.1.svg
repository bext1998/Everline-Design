        <text class="label" x="12" y="104">gray-800</text><text class="note" x="12" y="126">#444444</text>
      </g>
      <g id="swatch-gray-700" transform="translate(396 0)">
        <rect width="112" height="80" rx="12" fill="#4d4d4d"/>
        <text class="label" x="12" y="104">gray-700</text><text class="note" x="12" y="126">#4D4D4D</text>
      </g>
      <g id="swatch-gray-600" transform="translate(528 0)">
        <rect width="112" height="80" rx="12" fill="#666"/>
        <text class="label" x="12" y="104">gray-600</text><text class="note" x="12" y="126">#666666</text>
      </g>
      <g id="swatch-blue" transform="translate(660 0)">
        <rect width="112" height="80" rx="12" fill="#598ae8"/>
        <text class="label" x="12" y="104">primary</text><text class="note" x="12" y="126">#598AE8</text>
      </g>
      <g id="swatch-red" transform="translate(792 0)">
        <rect width="112" height="80" rx="12" fill="#c1272d"/>
        <text class="label" x="12" y="104">danger</text><text class="note" x="12" y="126">#C1272D</text>
      </g>
      <g id="swatch-off-white" transform="translate(924 0)">
        <rect width="112" height="80" rx="12" fill="#f2f2f2"/>
        <text class="label" x="12" y="104">foreground</text><text class="note" x="12" y="126">#F2F2F2</text>
